<html lang="tr">
<head>

  <!-- ============================================================

    true = açık, false = kapalı

  <script>
    const MODULLER = {

      uyku:      true,   // Uyku süresi ve kalitesi

  </script>

  <!-- ============================================================
    HEDEFLER — Kendi hedeflerini buraya yaz
  ============================================================ -->
  <script>
    const HEDEFLER = {
      gunlukKalori:   2000,   // kcal
      gunlukProtein:  150,    // gram
      gunlukSu:       2.5,    // litre
      gunlukAdim:     10000,  // adım
      gunlukUyku:     8,      // saat
      gunlukHarcama:  300,    // TL
      haftaAntrenman: 4,      // gün/hafta
      hedefKilo:      80,     // kg
    };
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link id="font-link" rel="stylesheet" href="">

  <style>
    /* ============================================================
       TEMEL STİLLER — Burası otomatik doluyor, elle değiştirme
    ============================================================ */
    :root {
      --ana: #4F46E5;
      --ikincil: #06B6D4;
      --bg: #0F0F1A;
      --yuzey: #1A1A2E;
      --yuzey2: #252540;
      --metin: #F1F5F9;
      --muted: #94A3B8;
      --border: rgba(255,255,255,0.08);
      --ok: #22C55E;
      --warn: #F59E0B;
      --bad: #EF4444;
      --r: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--metin);
      min-height: 100vh;
      display: flex;
    }

    /* --- SIDEBAR --- */
    #sidebar {
      width: 220px;
      min-width: 220px;
      background: var(--yuzey);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 1.25rem 0;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    #logo {
      padding: 0 1.25rem 1.25rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: .75rem;
    }
    #logo h1 { font-size: 15px; font-weight: 600; color: var(--metin); }
    #logo p  { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 1.25rem;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      transition: all .15s;
      border-radius: 0;
    }
    .nav-item:hover { color: var(--metin); background: var(--yuzey2); }
    .nav-item.active { color: var(--metin); background: rgba(79,70,229,.2); border-right: 2px solid var(--ana); }
    .nav-item i { font-size: 16px; }

    .nav-section {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      padding: .75rem 1.25rem .25rem;
      margin-top: .25rem;
    }

    /* --- ANA İÇERİK --- */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    #topbar h2 { font-size: 16px; font-weight: 600; }
    #topbar .date { font-size: 12px; color: var(--muted); }

    #content {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
    }

    /* --- PANELLER --- */
    .panel { display: none; }
    .panel.active { display: block; }

    /* --- KARTlar --- */
    .card {
      background: var(--yuzey);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .card h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--metin);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card h3 i { font-size: 16px; color: var(--muted); }

    /* --- METRİK KARTLAR --- */
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 1rem;
    }
    .metric {
      background: var(--yuzey2);
      border-radius: var(--r);
      padding: 1rem;
      border: 1px solid var(--border);
    }
    .metric label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 4px; }
    .metric .val   { font-size: 22px; font-weight: 700; color: var(--metin); }
    .metric .unit  { font-size: 12px; color: var(--muted); margin-left: 2px; }
    .metric .trend { font-size: 11px; margin-top: 4px; }
    .trend.up   { color: var(--ok); }
    .trend.down { color: var(--bad); }
    .trend.same { color: var(--muted); }

    /* --- SOHBET --- */
    #chat-messages {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 300px;
      max-height: 420px;
      overflow-y: auto;
      padding: 1rem;
      background: var(--yuzey2);
      border-radius: var(--r);
      margin-bottom: 1rem;
      border: 1px solid var(--border);
    }

    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
      background: rgba(79,70,229,.3);
    }
    .msg.user .msg-avatar { background: rgba(6,182,212,.25); }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.6;
      max-width: 78%;
    }
    .msg.ai .bubble {
      background: var(--yuzey);
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
    }
    .msg.user .bubble {
      background: rgba(79,70,229,.35);
      color: #E0DEFF;
      border-radius: 16px 4px 16px 16px;
    }

    .typing-dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    .chat-input-row {
      display: flex;
      gap: 8px;
    }
    .chat-input-row textarea {
      flex: 1;
      background: var(--yuzey2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      color: var(--metin);
      padding: 10px 14px;
      font-size: 13px;
      font-family: inherit;
      resize: none;
      height: 44px;
      transition: border-color .15s;
    }
    .chat-input-row textarea:focus { outline: none; border-color: var(--ana); }
    .chat-input-row textarea::placeholder { color: var(--muted); }

    .btn {
      background: var(--ana);
      border: none;
      border-radius: var(--r);
      color: #fff;
      padding: 0 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-ghost {
      background: var(--yuzey2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      color: var(--metin);
      padding: 8px 14px;
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-ghost:hover { background: var(--yuzey); border-color: var(--ana); }

    /* --- HIZLI EYLEMLER --- */
    .quick-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
      margin-bottom: 1rem;
    }
    .qbtn {
      background: var(--yuzey2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 10px 12px;
      cursor: pointer;
      text-align: left;
      transition: all .15s;
      color: var(--metin);
    }
    .qbtn:hover { border-color: var(--ana); background: rgba(79,70,229,.1); }
    .qbtn i { font-size: 18px; color: var(--muted); display: block; margin-bottom: 6px; }
    .qbtn span { font-size: 12px; font-weight: 500; display: block; }
    .qbtn small { font-size: 11px; color: var(--muted); display: block; margin-top: 2px; }

    /* --- RAPOR SATIRLARI --- */
    .report-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .report-row:last-child { border-bottom: none; }
    .report-row .lbl { color: var(--muted); }
    .report-row .val { font-weight: 600; }
    .ok   { color: var(--ok); }
    .warn { color: var(--warn); }
    .bad  { color: var(--bad); }

    /* --- INSIGHT KARTLAR --- */
    .insight {
      background: var(--yuzey2);
      border-left: 3px solid var(--ana);
      border-radius: 0 var(--r) var(--r) 0;
      padding: .85rem 1rem;
      font-size: 13px;
      color: var(--metin);
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .insight.warn  { border-left-color: var(--warn); }
    .insight.good  { border-left-color: var(--ok); }
    .insight i { font-size: 16px; flex-shrink: 0; margin-top: 1px; color: var(--ana); }
    .insight.warn i { color: var(--warn); }
    .insight.good i { color: var(--ok); }

    /* --- VERİ GİRİŞİ FORMU --- */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 1rem;
    }
    .form-group label {
      font-size: 11px;
      color: var(--muted);
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .form-group input, .form-group select {
      width: 100%;
      background: var(--yuzey2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--metin);
      padding: 9px 12px;
      font-size: 13px;
      font-family: inherit;
      transition: border-color .15s;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: var(--ana);
    }
    .form-group input::placeholder { color: var(--muted); }
    .form-group select option { background: var(--yuzey2); }

    /* --- İLERLEME ÇUBUĞU --- */
    .progress-bar {
      background: var(--border);
      border-radius: 99px;
      height: 6px;
      margin-top: 8px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--ana);
      transition: width .3s;
    }
    .progress-fill.ok   { background: var(--ok); }
    .progress-fill.warn { background: var(--warn); }

    /* --- BOŞ DURUM --- */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }
    .empty i { font-size: 36px; display: block; margin-bottom: .75rem; }
    .empty p { font-size: 13px; line-height: 1.6; }

    /* --- TABLOlar --- */
    .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .data-table th { text-align: left; color: var(--muted); padding: 6px 8px; border-bottom: 1px solid var(--border); font-weight: 600; }
    .data-table td { padding: 8px 8px; border-bottom: 1px solid var(--border); color: var(--metin); }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: rgba(255,255,255,.02); }

    /* --- GENEL --- */
    .flex { display: flex; align-items: center; gap: 8px; }
    .mt { margin-top: .75rem; }
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(79,70,229,.2); color: #A5B4FC;
      font-size: 11px; padding: 2px 8px; border-radius: 99px;
    }
    .section-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .75rem; }

    /* --- RESPONSIVE --- */
    @media (max-width: 640px) {
      #sidebar { display: none; }
      #content { padding: 1rem; }
    }

    /* --- SCROLLBAR --- */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<nav id="sidebar">
  <div id="logo">
    <h1 id="app-title">Yaşam Koçum</h1>
    <p id="app-slogan">AI Kişisel Asistan</p>
  </div>

  <button class="nav-item active" onclick="goster('koc')" data-panel="koc">
    <i class="ti ti-message-circle"></i> Koç
  </button>
  <button class="nav-item" onclick="goster('giris')" data-panel="giris">
    <i class="ti ti-edit"></i> Günlük Giriş

  <div class="nav-section">Takip</div>
  <button class="nav-item" onclick="goster('saglik')" data-panel="saglik">

  </button>
  <button class="nav-item" onclick="goster('beslenme')" data-panel="beslenme">
    <i class="ti ti-apple"></i> Beslenme
  </button>
  <button class="nav-item" onclick="goster('spor')" data-panel="spor">
    <i class="ti ti-run"></i> Spor
  </button>

  </button>

  </button>

  <button class="nav-item" onclick="goster('rapor')" data-panel="rapor">
    <i class="ti ti-file-analytics"></i> Haftalık Rapor
  </button>

    <i class="ti ti-bulb"></i> AI Analizleri
  </button>

<!-- ================ ANA İÇERİK ================ -->
<div id="main">
  <div id="topbar">
    <h2 id="panel-title">Koç</h2>
    <div class="flex">
      <span class="date" id="bugun-tarih"></span>
      <span class="badge"><i class="ti ti-database" style="font-size:11px"></i> Hafıza aktif</span>
    </div>
  </div>

  <div id="content">

    <!-- ===== KOÇ PANELİ ===== -->
    <div class="panel active" id="panel-koc">
      <div class="quick-grid">
        <button class="qbtn" onclick="hizliMesaj('Günlük veri girişi yapmak istiyorum.')">
          <i class="ti ti-plus"></i><span>Günlük giriş</span><small>Verileri konuşarak gir</small>
        </button>
        <button class="qbtn" onclick="hizliMesaj('Son durumumu analiz et ve önerilerin neler?')">
          <i class="ti ti-chart-line"></i><span>Analiz et</span><small>Genel değerlendirme</small>
        </button>
        <button class="qbtn" onclick="hizliMesaj('Haftalık rapor ver.')">
          <i class="ti ti-calendar-week"></i><span>Haftalık rapor</span><small>7 günlük özet</small>
        </button>
        <button class="qbtn" onclick="hizliMesaj('Hedeflerime ne kadar yaklaştım?')">
          <i class="ti ti-target"></i><span>Hedef takibi</span><small>İlerleme durumu</small>
        </button>
        <button class="qbtn" onclick="hizliMesaj('Bu hafta neyi daha iyi yapabilirim?')">
          <i class="ti ti-arrows-up"></i><span>Öneriler</span><small>Gelişim tavsiyeleri</small>
        </button>
        <button class="qbtn" onclick="hizliMesaj('Bugün kendimi iyi hissetmiyorum, ne yapmalıyım?')">
          <i class="ti ti-heart"></i><span>Motivasyon</span><small>Destek al</small>
        </button>
      </div>
      <div id="chat-messages"></div>
      <div class="chat-input-row">
        <textarea id="user-input" placeholder="Koçunla konuş..." onkeydown="handleKey(event)"></textarea>
        <button class="btn" id="send-btn" onclick="mesajGonder()">
          <i class="ti ti-send"></i>
        </button>
      </div>
    </div>

    <!-- ===== GÜNLÜK GİRİŞ PANELİ ===== -->
    <div class="panel" id="panel-giris">
      <div class="card">
        <h3><i class="ti ti-heart-rate"></i> Sağlık & Duygu</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>Kilo (kg)</label>
            <input type="number" id="g-kilo" placeholder="örn. 80.5" step="0.1">
          </div>
          <div class="form-group">
            <label>Enerji seviyesi (1-10)</label>
            <input type="number" id="g-enerji" placeholder="örn. 7" min="1" max="10">
          </div>
          <div class="form-group">
            <label>Stres seviyesi (1-10)</label>
            <input type="number" id="g-stres" placeholder="örn. 4" min="1" max="10">
          </div>
          <div class="form-group">
            <label>Ruh hali</label>
            <select id="g-ruh">
              <option value="">Seç...</option>
              <option>Harika</option>
              <option>İyi</option>
              <option>Normal</option>
              <option>Kötü</option>
              <option>Çok kötü</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card">
        <h3><i class="ti ti-apple"></i> Beslenme</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>Kalori (kcal)</label>
            <input type="number" id="g-kalori" placeholder="örn. 2000">
          </div>
          <div class="form-group">
            <label>Protein (g)</label>
            <input type="number" id="g-protein" placeholder="örn. 150">
          </div>
          <div class="form-group">
            <label>Karbonhidrat (g)</label>
            <input type="number" id="g-karbo" placeholder="örn. 200">
          </div>
          <div class="form-group">
            <label>Su (litre)</label>
            <input type="number" id="g-su" placeholder="örn. 2.5" step="0.1">
          </div>
        </div>
      </div>

      <div class="card">
        <h3><i class="ti ti-run"></i> Spor & Aktivite</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>Adım sayısı</label>
            <input type="number" id="g-adim" placeholder="örn. 8500">
          </div>
          <div class="form-group">
            <label>Antrenman</label>
            <input type="text" id="g-antrenman" placeholder="örn. Göğüs, Kardiyo">
          </div>
          <div class="form-group">
            <label>Antrenman süresi (dk)</label>
            <input type="number" id="g-antrenman-sure" placeholder="örn. 60">
          </div>
          <div class="form-group">
            <label>Kas ağrısı (1-10)</label>
            <input type="number" id="g-agri" placeholder="örn. 3" min="1" max="10">
          </div>
        </div>
      </div>

      <div class="card">
        <h3><i class="ti ti-moon"></i> Uyku</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>Uyku süresi (saat)</label>
            <input type="number" id="g-uyku" placeholder="örn. 7.5" step="0.5">
          </div>
          <div class="form-group">
            <label>Uyku kalitesi (1-10)</label>
            <input type="number" id="g-uyku-kalite" placeholder="örn. 8" min="1" max="10">

<script>
// ================================================================
//  UYGULAMA KODU — Kod bilgisi olmadan değiştirmene gerek yok
// ================================================================

// Ayarları uygula
document.documentElement.style.setProperty('--ana', AYARLAR.anaRenk);
document.documentElement.style.setProperty('--ikincil', AYARLAR.ikincilRenk);
document.documentElement.style.setProperty('--bg', AYARLAR.arkaplan);
document.documentElement.style.setProperty('--yuzey', AYARLAR.yuzey);
document.documentElement.style.setProperty('--yuzey2', AYARLAR.yuzey2);
document.documentElement.style.setProperty('--metin', AYARLAR.metin);
document.documentElement.style.setProperty('--muted', AYARLAR.metinMuted);

document.getElementById('app-title').textContent = AYARLAR.uygulamaAdi;
document.getElementById('app-slogan').textContent = AYARLAR.uygulamaSlogan;
document.getElementById('font-link').href = `https://fonts.googleapis.com/css2?family=${AYARLAR.font.replace(' ', '+')}:wght@400;500;600;700&display=swap`;
document.body.style.fontFamily = `'${AYARLAR.font}', -apple-system, sans-serif`;

// Tarih
const bugun = new Date();
document.getElementById('bugun-tarih').textContent = bugun.toLocaleDateString('tr-TR', { weekday:'long', day:'numeric', month:'long' });

// ================================================================
//  VERİ YÖNETİMİ
// ================================================================
const VERI_KEY = 'yasam_kocu_v3';

function veriYukle() {
  try { return JSON.parse(localStorage.getItem(VERI_KEY)) || { entries: [], chatGecmis: [] }; }
  catch(e) { return { entries: [], chatGecmis: [] }; }
}

function veriKaydet(d) {
  localStorage.setItem(VERI_KEY, JSON.stringify(d));
}

let appVeri = veriYukle();
let chatGecmis = appVeri.chatGecmis ? appVeri.chatGecmis.slice(-30) : [];

// ================================================================
//  NAVİGASYON
// ================================================================
const PANEL_BASLIKLAR = {
  koc: 'Koç', giris: 'Günlük Giriş', saglik: 'Sağlık',
  beslenme: 'Beslenme', spor: 'Spor', uyku: 'Uyku',
  finans: 'Finans', rapor: 'Haftalık Rapor', analiz: 'AI Analizleri'
};

function goster(panel) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('panel-' + panel).classList.add('active');
  document.querySelector(`[data-panel="${panel}"]`).classList.add('active');
  document.getElementById('panel-title').textContent = PANEL_BASLIKLAR[panel] || panel;

  if (panel === 'saglik')   renderSaglik();
  if (panel === 'beslenme') renderBeslenme();
  if (panel === 'spor')     renderSpor();
  if (panel === 'uyku')     renderUyku();
  if (panel === 'finans')   renderFinans();
  if (panel === 'rapor')    renderRapor();
  if (panel === 'analiz')   renderAnaliz();
}

// ================================================================
//  FORM KAYDETME
// ================================================================
function formKaydet() {
  const entry = {
    tarih: bugun.toLocaleDateString('tr-TR'),
    zaman: bugun.toISOString(),
    kilo:            parseFloat(document.getElementById('g-kilo').value) || null,
    enerji:          parseInt(document.getElementById('g-enerji').value) || null,
    stres:           parseInt(document.getElementById('g-stres').value) || null,
    ruhHali:         document.getElementById('g-ruh').value || null,
    kalori:          parseInt(document.getElementById('g-kalori').value) || null,
    protein:         parseInt(document.getElementById('g-protein').value) || null,
    karbonhidrat:    parseInt(document.getElementById('g-karbo').value) || null,
    su:              parseFloat(document.getElementById('g-su').value) || null,
    adim:            parseInt(document.getElementById('g-adim').value) || null,
    antrenman:       document.getElementById('g-antrenman').value || null,
    antrenmanSuresi: parseInt(document.getElementById('g-antrenman-sure').value) || null,
    kasAgrisi:       parseInt(document.getElementById('g-agri').value) || null,
    uyku:            parseFloat(document.getElementById('g-uyku').value) || null,
    uykuKalitesi:    parseInt(document.getElementById('g-uyku-kalite').value) || null,
    yatisSaati:      document.getElementById('g-yatis').value || null,
    kalkisSaati:     document.getElementById('g-kalkis').value || null,
    harcama:         parseInt(document.getElementById('g-harcama').value) || null,
    dersCalisma:     parseFloat(document.getElementById('g-ders').value) || null,
    notlar:          document.getElementById('g-notlar').value || null,
  };

  // Boş alanları temizle
  Object.keys(entry).forEach(k => entry[k] === null && delete entry[k]);

  if (Object.keys(entry).length <= 2) {
    alert('Lütfen en az birkaç değer gir!');
    return;
  }

  // Bugün için zaten giriş varsa üzerine yaz
  const bugunStr = bugun.toLocaleDateString('tr-TR');
  const idx = appVeri.entries.findIndex(e => e.tarih === bugunStr);
  if (idx >= 0) appVeri.entries[idx] = entry;
  else appVeri.entries.push(entry);

  veriKaydet(appVeri);

  // Formu temizle
  ['g-kilo','g-enerji','g-stres','g-kalori','g-protein','g-karbo','g-su',
   'g-adim','g-antrenman','g-antrenman-sure','g-agri','g-uyku','g-uyku-kalite',
   'g-yatis','g-kalkis','g-harcama','g-ders','g-notlar'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });

  // AI'ya analiz ettir
  const ozet = Object.entries(entry)
    .filter(([k,v]) => v && k !== 'tarih' && k !== 'zaman')
    .map(([k,v]) => `${k}:${v}`).join(', ');

  goster('koc');
  hizliMesaj(`Bugünün verilerini kaydettim: ${ozet}. Bunları analiz eder misin ve önerilerini paylaşır mısın?`);
}

// ================================================================
//  SOHBET
// ================================================================
function hafizaOlustur() {
  const entries = appVeri.entries.slice(-14);
  let mem = `Kullanıcı adı: ${AYARLAR.kullaniciAdi}\n`;
  mem += `Hedefler: Günlük kalori=${HEDEFLER.gunlukKalori}kcal, protein=${HEDEFLER.gunlukProtein}g, su=${HEDEFLER.gunlukSu}L, adım=${HEDEFLER.gunlukAdim}, uyku=${HEDEFLER.gunlukUyku}sa, harcama=${HEDEFLER.gunlukHarcama}₺, hedef kilo=${HEDEFLER.hedefKilo}kg\n`;
  if (entries.length > 0) {
    mem += `\nSon ${entries.length} günlük veriler:\n`;
    entries.forEach(e => {
      const parts = Object.entries(e)
        .filter(([k,v]) => v && !['tarih','zaman'].includes(k))
        .map(([k,v]) => `${k}:${v}`);
      if (parts.length) mem += `[${e.tarih}] ${parts.join(' | ')}\n`;
    });
  } else {
    mem += 'Henüz veri yok.\n';
  }
  return mem;
}

const SISTEM_PROMPT = `Sen "Yaşam Koçu" adında gelişmiş bir kişisel asistan yapay zekasın. Türkçe konuşuyorsun. Samimi, destekleyici ve arkadaşça bir ton kullanıyorsun.

KULLANICININ HAFIZASI VE VERİLERİ:
{HAFIZA}

GÖREVLERİN:
1. Kullanıcının verilerini analiz et ve somut, kişiselleştirilmiş öneriler ver
2. Hedeflerle mevcut durumu karşılaştır
3. Veri girişini destekle — kullanıcı veri paylaşırsa kabul et
4. Proaktif uyarılar ver (eksik protein, az uyku, yüksek harcama vb.)
5. Bağlantılar kur: uyku-enerji, kalori-kilo, stres-performans vb.

TON: Samimi ama odaklı. Kısa ve net cevaplar ver. Uzun listeler yerine en önemli 2-3 şeyi söyle.`;

function mesajEkle(rol, metin) {
  const box = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg ${rol}`;
  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = rol === 'user' ? '👤' : '🌱';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.textContent = metin;
  div.appendChild(av);
  div.appendChild(bub);
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function yaziyorGoster() {
  const box = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg ai'; div.id = 'typing';
  div.innerHTML = '<div class="msg-avatar">🌱</div><div class="bubble" style="display:flex;gap:4px;align-items:center"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>';
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}
function yaziyorKaldir() { const t=document.getElementById('typing'); if(t) t.remove(); }

async function mesajGonder(text) {
  const inp = document.getElementById('user-input');
  const msg = text || inp.value.trim();
  if (!msg) return;
  inp.value = '';
  document.getElementById('send-btn').disabled = true;

  mesajEkle('user', msg);
  chatGecmis.push({ role: 'user', content: msg });
  yaziyorGoster();

  const sistem = SISTEM_PROMPT.replace('{HAFIZA}', hafizaOlustur());

  try {
    const headers = { 'Content-Type': 'application/json' };
    if (AYARLAR.apiKey) headers['x-api-key'] = AYARLAR.apiKey;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers,
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: sistem,
        messages: chatGecmis
      })
    });
    const data = await res.json();
    const cevap = data.content?.map(b => b.text||'').join('') || 'Bir hata oluştu.';
    yaziyorKaldir();
    mesajEkle('ai', cevap);
    chatGecmis.push({ role: 'assistant', content: cevap });
    appVeri.chatGecmis = chatGecmis.slice(-30);
    veriKaydet(appVeri);
  } catch(e) {
    yaziyorKaldir();
    mesajEkle('ai', 'Bağlantı hatası oluştu. İnternet bağlantını kontrol et.');
  }

  document.getElementById('send-btn').disabled = false;
}

function hizliMesaj(t) { goster('koc'); setTimeout(() => mesajGonder(t), 100); }
function handleKey(e) { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); mesajGonder(); } }

// ================================================================
//  VERİ PANELLERİ
// ================================================================
function son(key, n=7) {
  return appVeri.entries.slice(-n).map(e=>e[key]).filter(v=>v!=null).map(Number);
}
function ort(arr) { return arr.length ? (arr.reduce((a,b)=>a+b,0)/arr.length) : null; }
function son1(key) { 
  for(let i=appVeri.entries.length-1;i>=0;i--) {
    if(appVeri.entries[i][key]!=null) return appVeri.entries[i][key];
  }
  return null;
}

function metrikKart(label, deger, birim, hedef, istenenYon) {
  if (deger == null) return `<div class="metric"><label>${label}</label><div class="val" style="font-size:14px;color:var(--muted)">Veri yok</div></div>`;
  const n = parseFloat(deger);
  let trendHTML = '';
  if (hedef) {
    const oran = n / hedef;
    const renk = oran >= 0.9 && oran <= 1.1 ? 'ok' : oran < 0.7 || oran > 1.3 ? 'bad' : 'warn';
    const bar = Math.min(oran, 1.3) * 100;
    trendHTML = `<div class="progress-bar"><div class="progress-fill ${renk}" style="width:${Math.min(bar,100).toFixed(0)}%"></div></div><div style="font-size:10px;color:var(--muted);margin-top:4px">Hedef: ${hedef}${birim}</div>`;
  }
  return `<div class="metric"><label>${label}</label><div class="val">${typeof n === 'number' && !Number.isInteger(n) ? n.toFixed(1) : n}<span class="unit">${birim}</span></div>${trendHTML}</div>`;
}

function tabloHTML(sutunlar, veriler) {
  if (!veriler.length) return '<div class="empty"><i class="ti ti-database-off"></i><p>Veri yok. Günlük giriş sekmesinden veri ekle.</p></div>';
  const header = sutunlar.map(s=>`<th>${s.label}</th>`).join('');
  const rows = veriler.slice(-14).reverse().map(e => {
    const cells = sutunlar.map(s => {
      const v = e[s.key];
      return `<td>${v != null ? v + (s.birim||'') : '-'}</td>`;
    }).join('');
    return `<tr><td style="color:var(--muted)">${e.tarih}</td>${cells}</tr>`;
  }).join('');
  return `<div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Tarih</th>${header}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

function renderSaglik() {
  const el = document.getElementById('saglik-metrikler');
  el.innerHTML = [
    metrikKart('Son kilo', son1('kilo'), 'kg', HEDEFLER.hedefKilo),
    metrikKart('Ort. enerji', ort(son('enerji'))?.toFixed(1), '/10', 7),
    metrikKart('Ort. stres', ort(son('stres'))?.toFixed(1), '/10', null),
  ].join('');
  document.getElementById('saglik-tablo').innerHTML = tabloHTML(
    [{key:'kilo',label:'Kilo',birim:'kg'},{key:'enerji',label:'Enerji',birim:'/10'},{key:'stres',label:'Stres',birim:'/10'},{key:'ruhHali',label:'Ruh Hali'}],
    appVeri.entries
  );
}

  document.getElementById('finans-tablo').innerHTML = tabloHTML(
    [{key:'harcama',label:'Harcama',birim:'₺'},{key:'notlar',label:'Not'}],
    appVeri.entries
  );
}

function renderRapor() {
  const el = document.getElementById('rapor-icerik');
  const e7 = appVeri.entries.slice(-7);
  if (!e7.length) {
    el.innerHTML = '<div class="empty"><i class="ti ti-file-analytics"></i><p>Rapor için veri yok. Günlük giriş sekmesinden veri ekle.</p></div>';
    return;
  }
  const a = key => { const v=e7.map(e=>e[key]).filter(x=>x!=null).map(Number); return v.length?v.reduce((a,b)=>a+b,0)/v.length:null; };
  const s = key => e7.map(e=>e[key]).filter(x=>x!=null).map(Number).reduce((a,b)=>a+b,0);
  const kiloVals = e7.map(e=>e.kilo).filter(x=>x);
  const kiloD = kiloVals.length>=2 ? (kiloVals[kiloVals.length-1]-kiloVals[0]).toFixed(1) : null;

  function satirHTML(label, deger, hedef, birim, tersDireksiyon=false) {
    if (deger == null) return '';
    const n = parseFloat(deger);
    let renk = '';
    if (hedef) {
      const oran = n/hedef;
      renk = (!tersDireksiyon ? (oran>=0.85 ? 'ok' : oran>=0.6 ? 'warn' : 'bad') : (oran<=1.1 ? 'ok' : oran<=1.3 ? 'warn' : 'bad'));
    }
    return `<div class="report-row"><span class="lbl">${label}</span><span class="val ${renk}">${typeof n==='number'&&!Number.isInteger(n)?n.toFixed(1):n}${birim}</span></div>`;
  }

  el.innerHTML = `
  <div class="card">
    <h3><i class="ti ti-calendar-week"></i> Son 7 günün özeti</h3>
    ${satirHTML('Ortalama kalori', a('kalori')?.toFixed(0), HEDEFLER.gunlukKalori, ' kcal')}
    ${satirHTML('Ortalama protein', a('protein')?.toFixed(0), HEDEFLER.gunlukProtein, ' g')}
    ${satirHTML('Ortalama su', a('su')?.toFixed(1), HEDEFLER.gunlukSu, ' L')}
    ${satirHTML('Ortalama adım', a('adim')?.toFixed(0), HEDEFLER.gunlukAdim, '')}
    ${satirHTML('Ortalama uyku', a('uyku')?.toFixed(1), HEDEFLER.gunlukUyku, ' sa')}
    ${satirHTML('Ortalama enerji', a('enerji')?.toFixed(1), 7, '/10')}
    ${satirHTML('Ortalama stres', a('stres')?.toFixed(1), HEDEFLER.gunlukHarcama, '/10', true)}
    ${satirHTML('Toplam harcama', s('harcama').toFixed(0), HEDEFLER.gunlukHarcama*7, ' ₺', true)}
    ${kiloD !== null ? `<div class="report-row"><span class="lbl">Kilo değişimi</span><span class="val ${parseFloat(kiloD)<=0?'ok':'warn'}">${parseFloat(kiloD)>0?'+':''}${kiloD} kg</span></div>` : ''}
    <div class="report-row"><span class="lbl">Toplam giriş</span><span class="val">${e7.length} gün</span></div>
  </div>
  <button class="btn mt" style="width:100%;justify-content:center;padding:11px" onclick="hizliMesaj('Haftalık raporumu AI gözüyle değerlendir ve en önemli 3 öneriyi ver.')">
    <i class="ti ti-sparkles"></i> AI ile Derinlemesine Analiz Et
  </button>`;
}

function renderAnaliz() {
  const el = document.getElementById('analiz-icerik');
  const entries = appVeri.entries;
  if (entries.length < 3) {
    el.innerHTML = '<div class="empty"><i class="ti ti-bulb"></i><p>Analiz için en az 3 günlük veri gerekli.<br>Koç veya Günlük Giriş sekmesinden veri ekle.</p></div>';
    return;
  }

  const insights = [];
  const last7 = entries.slice(-7);

  const uykuV = last7.map(e=>e.uyku).filter(x=>x).map(Number);
  if (uykuV.length>=3) {
    const avg = ort(uykuV);
    if (avg < 6.5) insights.push({t:'warn',i:'ti-moon',m:`Son ${uykuV.length} günde ortalama uyku ${avg.toFixed(1)} saat. Hedefin ${HEDEFLER.gunlukUyku} saat.`});
    else insights.push({t:'good',i:'ti-moon',m:`Uyku düzenin iyi: ortalama ${avg.toFixed(1)} saat.`});
  }

  const enV = last7.map(e=>e.enerji).filter(x=>x).map(Number);
  if (enV.length>=3 && uykuV.length>=3) {
    if (ort(uykuV)<6.5 && ort(enV)<6) insights.push({t:'warn',i:'ti-link',m:'Az uyku = düşük enerji bağlantısı görünüyor. Yatış saatini öne al.'});
  }

  const kaloV = last7.map(e=>e.kalori).filter(x=>x).map(Number);
  if (kaloV.length>=3) {
    const avg = ort(kaloV);
    if (avg < HEDEFLER.gunlukKalori*0.75) insights.push({t:'warn',i:'ti-apple',m:`Kalori alımın çok düşük (ort. ${avg.toFixed(0)} kcal). Hedel: ${HEDEFLER.gunlukKalori} kcal.`});
    else if (avg > HEDEFLER.gunlukKalori*1.2) insights.push({t:'warn',i:'ti-apple',m:`Kalori alımın hedefin üzerinde (ort. ${avg.toFixed(0)} kcal).`});
    else insights.push({t:'good',i:'ti-apple',m:`Kalori dengeli: ort. ${avg.toFixed(0)} kcal.`});
  }

  const strV = last7.map(e=>e.stres).filter(x=>x).map(Number);
  if (strV.length>=3 && ort(strV)>7) insights.push({t:'warn',i:'ti-activity',m:`Stres seviyen yüksek (ort. ${ort(strV).toFixed(1)}/10). Dinlenme ve nefes egzersizleri dene.`});

  const antV = last7.filter(e=>e.antrenman&&e.antrenman!='null');
  if (last7.length>=5 && antV.length < HEDEFLER.haftaAntrenman-1) insights.push({t:'warn',i:'ti-run',m:`Bu hafta ${antV.length} antrenman. Hedel: ${HEDEFLER.haftaAntrenman} gün/hafta.`});
  else if (antV.length>=HEDEFLER.haftaAntrenman) insights.push({t:'good',i:'ti-run',m:`Antrenman hedefine ulaştın! ${antV.length} gün/hafta.`});

  const harcamaV = last7.map(e=>e.harcama).filter(x=>x).map(Number);
  if (harcamaV.length>=3) {
    const avg = ort(harcamaV);
    if (avg > HEDEFLER.gunlukHarcama*1.2) insights.push({t:'warn',i:'ti-coin',m:`Günlük harcama ortalaması ${avg.toFixed(0)}₺. Hedef: ${HEDEFLER.gunlukHarcama}₺.`});
  }

  if (!insights.length) insights.push({t:'info',i:'ti-check',m:'Veri birikiyor. Daha fazla giriş yaptıkça daha detaylı analizler çıkacak.'});

  el.innerHTML = insights.map(i =>
    `<div class="insight ${i.t}"><i class="ti ${i.i}"></i><span>${i.m}</span></div>`
  ).join('') +
  `<button class="btn mt" style="width:100%;justify-content:center;padding:11px" onclick="hizliMesaj('Verilerimi detaylı analiz et, davranış örüntülerini bul ve önümüzdeki hafta için kişiselleştirilmiş bir plan öner.')">
    <i class="ti ti-sparkles"></i> AI ile Tam Analiz Yaptır
  </button>`;
}

(function init() {
  const box = document.getElementById('chat-messages');
  if (appVeri.entries.length === 0) {
    mesajEkle('ai', `Merhaba! Ben senin kişisel yaşam koçunum. 🌱\n\nSoldaki "Günlük Giriş" sekmesinden her gün verilerini girebilir, ya da burada benimle konuşarak veri kaydedebilirsin.\n\nNasıl başlamak istersin?`);
  } else {
    const son = appVeri.entries[appVeri.entries.length-1];
    mesajEkle('ai', `Tekrar hoş geldin! 👋 ${appVeri.entries.length} günlük verim var.\n\nSon giriş: ${son.tarih}. Bugünün verilerini girmek ister misin?`);
  }
})();
</script>
